<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🍌 이작초등학교 1학기 교육활동 타임라인 맵핑</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        /* 초등학교 교실에 어울리는 따뜻하고 산뜻한 파스텔톤 배경 */
        body { 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            background: linear-gradient(135deg, #fef08a 0%, #e0f2fe 50%, #f0fdf4 100%); 
            color: #334155; 
            margin: 0; 
            padding: 30px 40px; 
            text-align: center;
            min-height: 100vh;
        }
        
        /* 타이틀 영역 꾸미기 */
        .header-container {
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 2px dashed #facc15;
            box-shadow: 0 8px 20px rgba(250, 204, 21, 0.1);
        }
        h1 { color: #0369a1; font-size: 2.6rem; margin: 0 0 8px 0; letter-spacing: -1px; }
        .subtitle { color: #475569; font-size: 1.15rem; font-weight: bold; }
        
        /* 아동형/에듀테크 스타일의 동글동글한 버튼 세팅 */
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .btn { 
            padding: 12px 28px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        
        .btn-toggle { background: #facc15; color: #451a03; border: 2px solid #eab308; }
        .btn-toggle:hover { background: #fde047; }
        
        .btn-reset { background: #f87171; color: white; border: 2px solid #f87171; }
        .btn-reset:hover { background: #fca5a5; }

        /* 대화면 메인 차트 판넬 */
        .chart-container { 
            width: 92%; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 35px; 
            border-radius: 32px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            border: 3px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🍌 이작초등학교 1학기 교육활동 타임라인 맵핑 ✨</h1>
        <div class="subtitle">1학기 교육활동에 대한 인식(교육적 성과, 행사 진행의 어려움 등)</div>
    </div>

    <div class="btn-container">
        <button class="btn btn-toggle" id="toggleViewBtn">✨ 개별 분포(은하수) 보기</button>
        <button class="btn btn-reset" id="resetBtn">🔄 처음부터 다시하기</button>
    </div>

    <div class="chart-container">
        <canvas id="timelineChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚠️ 본인의 Firebase 설정값으로 유지해주세요
        const firebaseConfig = {
          apiKey: "AIzaSyD0JJU-fNQHGwpjfFBZWe5se-QV_cBIP-E",
          authDomain: "timelinemaping-5bfea.firebaseapp.com",
          databaseURL: "https://timelinemaping-5bfea-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "timelinemaping-5bfea",
          storageBucket: "timelinemaping-5bfea.firebasestorage.app",
          messagingSenderId: "482092342253",
          appId: "1:482092342253:web:7dcf66a261173a62bba5e4"        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const eventConfig = [
            { id: 'event1', date: '2026-03-03', name: '개학식 및 입학식' },
            { id: 'event2', date: '2026-03-26', name: '교육과정 설명회 및 학부모 공개수업' },
            { id: 'event3', date: '2026-04-15', name: '과학 체험의 날' },
            { id: 'event4', date: '2026-04-30', name: '꿈키움 어울림 마당(운동회)' },
            { id: 'event5', date: '2026-05-13', name: '봄 현장체험학습' },
            { id: 'event6', date: '2026-06-17', name: '꿈펼침 체험학습(키자니아, 미래교육원)' },
            { id: 'event7', date: '2026-07-03', name: '하계 스포츠 체험학습' },
            { id: 'event8', date: '2026-07-24', name: '여름방학식' }
        ];

        let currentView = 'average'; 
        let rawFirebaseData = {};

        const ctx = document.getElementById('timelineChart').getContext('2d');
        const timelineChart = new Chart(ctx, {
            data: { datasets: [] },
            options: {
                responsive: true,
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'month', displayFormats: { month: 'M월' } },
                        min: '2026-03-01', max: '2026-07-31',
                        grid: { color: '#f1f5f9', lineWidth: 2 },
                        ticks: { color: '#0f172a', font: { size: 15, weight: 'bold' } }
                    },
                    y: {
                        min: 0, max: 5,
                        grid: { color: '#f1f5f9', lineWidth: 2 },
                        ticks: { color: '#475569', font: { size: 14, weight: 'bold' } }
                    }
                },
                plugins: {
                    legend: { position: 'top', labels: { font: { size: 14, weight: 'bold' }, boxWidth: 15 } },
                    tooltip: {
                        padding: 14,
                        cornerRadius: 16,
                        callbacks: {
                            title: (context) => {
                                const datasetIndex = context[0].datasetIndex;
                                return currentView === 'average' ? eventConfig[context[0].dataIndex].name : timelineChart.data.datasets[datasetIndex].label;
                            },
                            label: (context) => {
                                return currentView === 'average' ? ` 평균 점수: ⭐ ${context.parsed.y.toFixed(1)}점` : ` 선택 점수: 📍 ${context.parsed.y.toFixed(0)}점`;
                            }
                        }
                    }
                }
            }
        });

        function updateChartTemplate() {
            if (currentView === 'average') {
                const avgData = eventConfig.map(event => {
                    const data = rawFirebaseData[event.id] || {};
                    return { x: event.date, y: data.averageScore || 0 };
                });

                timelineChart.data.datasets = [{
                    type: 'line',
                    label: '🌿 우리 학교 1학기 성장 곡선 (평균)',
                    data: avgData,
                    borderColor: '#0284c7',
                    backgroundColor: 'rgba(2, 132, 199, 0.05)',
                    borderWidth: 5,
                    pointBackgroundColor: '#facc15',
                    pointBorderColor: '#0284c7',
                    pointBorderWidth: 3,
                    pointRadius: 9,
                    tension: 0.25
                }];
            } else {
                const datasets = [];
                // 부드러운 개별 점 분포를 위한 파스텔톤 테마 색상 배열들
                const colors = ['#38bdf8', '#4ade80', '#fb923c', '#f472b6', '#a78bfa', '#fb7185', '#2dd4bf', '#fbbf24'];
                
                eventConfig.forEach((event, idx) => {
                    const eventData = rawFirebaseData[event.id] || {};
                    const allScores = eventData.scores ? Object.values(eventData.scores) : [];
                    
                    const distData = allScores.map(score => ({
                        x: event.date,
                        y: score + (Math.random() * 0.25 - 0.125) // 은하수 느낌으로 부드럽게 분산
                    }));

                    datasets.push({
                        type: 'scatter',
                        label: event.name.split('.')[1]?.trim() || event.name,
                        data: distData,
                        backgroundColor: colors[idx % colors.length],
                        pointRadius: 7,
                        pointHoverRadius: 10,
                    });
                });
                timelineChart.data.datasets = datasets;
            }
            timelineChart.update();
        }

        const eventsRef = ref(database, 'events');
        onValue(eventsRef, (snapshot) => {
            rawFirebaseData = snapshot.val() || {};
            updateChartTemplate();
        });

        document.getElementById('toggleViewBtn').addEventListener('click', () => {
            if (currentView === 'average') {
                currentView = 'distribution';
                document.getElementById('toggleViewBtn').innerText = '📈 평균 곡선 보기';
            } else {
                currentView = 'average';
                document.getElementById('toggleViewBtn').innerText = '✨ 개별 분포(은하수) 보기';
            }
            updateChartTemplate();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm("🚨 정말로 모든 선생님들의 투표 데이터를 초기화하시겠습니까?")) {
                set(ref(database, 'events'), {}).then(() => {
                    alert("성공적으로 초기화되었습니다! 새로고침합니다.");
                    location.reload();
                });
            }
        });
    </script>
</body>
</html>
