<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1학기 타임라인 맵핑 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 40px; text-align: center; }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 10px; }
        .chart-container { width: 85%; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h1>📈 1학기 교육활동 실시간 타임라인 맵핑</h1>
    <p style="color: #94a3b8;">우리 학교의 1학기 발자취를 따라 각 행사의 인식 변화를 실시간으로 확인합니다.</p>

    <div class="chart-container">
        <canvas id="timelineChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 설정 (본인 프로젝트 정보 입력)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 1. Chart.js 초기화 (시간 순서대로 세팅)
        const ctx = document.getElementById('timelineChart').getContext('2d');
        const timelineChart = new Chart(ctx, {
            type: 'line', // 타임라인 연결을 위한 선형 차트
            data: {
                labels: ['3월: 교육과정 워크숍', '4월: AI·디지털 공개수업', '5월: 현장체험학습', '6월: 정보통신 윤리주간', '7월: 1학기 마무리'],
                datasets: [{
                    label: '행사별 인식 점수 (평균)',
                    data: [0, 0, 0, 0, 0], // 초기값
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.2)',
                    borderWidth: 4,
                    pointBackgroundColor: '#f43f5e',
                    pointRadius: 8,
                    pointHoverRadius: 12,
                    tension: 0.3 // 곡선 부드러움 정도
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        min: 0,
                        max: 5, // 5점 만점 기준
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8', font: { size: 14 } }
                    },
                    x: {
                        grid: { color: '#334155' },
                        ticks: { color: '#cbd5e1', font: { size: 16, weight: 'bold' } }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        // 2. Firebase 실시간 데이터 감시 및 차트 업데이트
        const events = ['event1', 'event2', 'event3', 'event4', 'event5'];
        events.forEach((eventId, index) => {
            const scoreRef = ref(database, `events/${eventId}/averageScore`);
            onValue(scoreRef, (snapshot) => {
                const score = snapshot.val() || 0;
                
                // 해당 인덱스의 차트 데이터 실시간 변경
                timelineChart.data.datasets[0].data[index] = score;
                timelineChart.update(); // 차트 리프레시 (애니메이션 효과 적용됨)
            });
        });
    </script>
</body>
</html>
