<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이작초 1학기 성찰 워크숍 입력 폼</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f8fafc; color: #1e293b; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #0284c7; }
        .event-card { border-bottom: 1px solid #e2e8f0; padding: 15px 0; }
        .event-name { font-weight: bold; margin-bottom: 10px; font-size: 1.05rem; }
        .rating { display: flex; justify-content: space-between; }
        .rating label { display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; color: #64748b; cursor: pointer; }
        .rating input { width: 20px; height: 20px; margin-bottom: 4px; }
        button { width: 100%; padding: 15px; background: #0284c7; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 이작초 1학기 성찰 인식조사</h2>
    <p style="text-align: center; color: #64748b; font-size: 0.9rem;">각 교육활동의 성찰 점수(1~5점)를 선택해주세요.</p>
    
    <form id="surveyForm">
        <div id="eventsList"></div>
        <button type="button" id="submitBtn">성찰 결과 제출하기</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 💡 [중요] 2단계에서 확인한 파이어베이스 실제 설정값으로 꼭 채워주세요!
    const firebaseConfig = {
          apiKey: "AIzaSyD0JJU-fNQHGwpjfFBZWe5se-QV_cBIP-E",
          authDomain: "timelinemaping-5bfea.firebaseapp.com",
          databaseURL: "https://timelinemaping-5bfea-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "timelinemaping-5bfea",
          storageBucket: "timelinemaping-5bfea.firebasestorage.app",
          messagingSenderId: "482092342253",
          appId: "1:482092342253:web:7dcf66a261173a62bba5e4"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // 대화면과 똑같은 행사 목록 설정
    const eventConfig = [
        { id: 'event1', name: '3.3. 개학식 및 입학식' },
        { id: 'event2', name: '3.26. 교육과정 설명회 및 학부모 공개수업' },
        { id: 'event3', name: '4.15. 과학 체험의 날' },
        { id: 'event4', name: '4.30. 꿈키움 어울림 마당(운동회)' },
        { id: 'event5', name: '5.13. 봄 현장체험학습' },
        { id: 'event6', name: '6.17. 꿈펼침 체험학습(키자니아, 미래교육원)' },
        { id: 'event7', name: '7.3. 하계 스포츠 체험학습' },
        { id: 'event8', name: '7.24. 여름방학식' }
    ];

    // 스마트폰 화면에 라디오 버튼 동적 생성
    const listContainer = document.getElementById('eventsList');
    eventConfig.forEach(event => {
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = `
            <div class="event-name">${event.name}</div>
            <div class="rating">
                ${[1,2,3,4,5].map(num => `
                    <label>
                        <input type="radio" name="${event.id}" value="${num}" required>
                        ${num}점
                    </label>
                `).join('')}
            </div>
        `;
        listContainer.appendChild(card);
    });

    // 제출 버튼 클릭 시 실시간 평균 계산 알고리즘 트랜잭션 작동
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const form = document.getElementById('surveyForm');
        if (!form.checkValidity()) {
            alert('모든 행사의 점수를 선택해주세요!');
            return;
        }

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = "제출 중...";

        for (const event of eventConfig) {
            const selectedScore = parseInt(form.elements[event.id].value);
            const eventRef = ref(database, `events/${event.id}`);

            // 트랜잭션을 활용해 여러 명이 동시에 제출해도 누적 평균이 깨지지 않도록 안전하게 처리
            await runTransaction(eventRef, (currentData) => {
                if (!currentData) {
                    return { count: 1, totalScore: selectedScore, averageScore: selectedScore };
                }
                const newCount = (currentData.count || 0) + 1;
                const newTotal = (currentData.totalScore || 0) + selectedScore;
                return {
                    count: newCount,
                    totalScore: newTotal,
                    averageScore: newTotal / newCount
                };
            });
        }

        alert('성찰 점수가 성공적으로 제출되었습니다. 교실 대화면을 확인해보세요!');
        location.reload(); // 초기화
    });
</script>
</body>
</html>
